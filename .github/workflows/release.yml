name: Release

# Publish to npm when a version tag is pushed.
# Pattern adapted from VictorTomaili/mendeley-cli, with:
#   - NODE_AUTH_TOKEN (via setup-node registry-url) instead of a hand-written .npmrc
#   - generate_release_notes (GitHub auto-notes) instead of a custom changelog heredoc
#   - npm pack --dry-run to preview exactly what gets published
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v0.1.0
      - "v[0-9]+.[0-9]+.[0-9]+-*"      # v0.1.0-beta.1

env:
  NODE_VERSION: "22"

permissions:
  contents: write   # create the GitHub Release

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          # registry-url makes setup-node write an .npmrc that reads the token
          # from the NODE_AUTH_TOKEN env var on the publish step.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Sync package.json version with tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            echo "Bumping package.json $CURRENT -> $VERSION"
            npm version "$VERSION" --no-git-tag-version
          else
            echo "package.json already at $VERSION"
          fi

      - name: Preview published files
        run: npm pack --dry-run

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
